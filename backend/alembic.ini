# A generic, single database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to search for directories
# containing python files
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion of database types to types supported by sqlalchemy
# sqlalchemy.type_conversion_policy =

# logging configuration
# [loggers]
# keys = root,sqlalchemy,alembic

# [handlers]
# keys = console

# [formatters]
# keys = generic
